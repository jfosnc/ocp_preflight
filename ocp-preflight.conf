# Phase of install:
#   pre-bootstrap  = before bootstrap-complete
#   post-bootstrap = after bootstrap-complete, before/while finishing install
PHASE="pre-bootstrap"

# DNS
DNS_SERVER="192.168.10.53"

# Cluster identity
CLUSTER_NAME="ocp01"
BASE_DOMAIN="lab.example.com"

# VIPs
API_VIP="192.168.10.20"
INGRESS_VIP="192.168.10.21"

# Node inventory: shortname:ip
BOOTSTRAP_NODE="bootstrap:192.168.10.30"
MASTER_NODES=(
  "master0:192.168.10.31"
  "master1:192.168.10.32"
  "master2:192.168.10.33"
)
WORKER_NODES=(
  "worker0:192.168.10.41"
  "worker1:192.168.10.42"
)

# Ingress backends:
# For a normal cluster, use workers.
# For a 3-node cluster with zero workers, use masters instead.
INGRESS_NODES=("${WORKER_NODES[@]}")

# Optional: SSH into the load balancer to verify HAProxy config and listeners
ENABLE_LB_SSH_CHECK="yes"
LB_HOST="lb01.lab.example.com"
LB_SSH_USER="core"
HAPROXY_CFG="/etc/haproxy/haproxy.cfg"

# Optional: inspect PXE/iPXE artifacts
ENABLE_BOOT_ARTIFACT_CHECK="yes"
BOOT_METHOD="ipxe"   # ipxe | pxe | generic
BOOT_ARTIFACTS=(
  "http://192.168.10.10/boot/bootstrap.ipxe"
  "http://192.168.10.10/boot/master.ipxe"
  "http://192.168.10.10/boot/worker.ipxe"
)

# For multi-NIC servers, require a pinned boot NIC in the kernel args
REQUIRE_PINNED_NIC="yes"
EXPECT_BOOT_NIC="eno1"

# Expected target installation disk path in the boot artifacts
EXPECT_INSTALL_DEV="/dev/nvme0n1"

