name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shell-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck python3-yaml

      - name: Bash syntax check
        run: |
          bash -n ocp-preflight.sh
          bash ./ocp-preflight.sh --validate-config ocp-preflight.yaml

      - name: Run ShellCheck
        run: shellcheck ocp-preflight.sh

  shell-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install YAML support
        run: sudo apt-get update && sudo apt-get install -y python3-yaml

      - name: Run shell tests
        run: bash tests/run-tests.sh
